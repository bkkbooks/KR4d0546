body:
  text: 詠物詩别集類四元提要臣等謹案詠物詩一卷元謝宗可撰宗可自稱金陵人其始末無考相傳為元人故顧嗣立元百家詩選録是編于戊集之末亦不知其當何代也昔屈原頌橘荀況賦蠶詠物之作萌芽于是然特賦家流耳漢武之天馬班固之白雉寳鼎亦皆因事抒文非主于刻畫一物其托物寄懷見于詩篇者蔡邕詠庭前石榴其始見也沿及六朝此風漸盛王融謝朓至以唱和相髙而大致多主于𨽻事唐宋兩朝則作者蔚起不可以屈指計矣其特出者杜甫之比興深微蘇軾黄庭堅之譬喻奇巧皆挺出衆流其餘則唐尚形容宋叅議論而寄情寓諷旁見側出于其中其大較也中間如雍鷺鷥崔鴛鴦鄭鷓鴣各以摹冩之工得名當世而宋代謝蝴蝶等遂一題衍至百首但以得句相誇不必縁情而作于是别岐為詩家小品而詠物之變極矣宗可此編凡一百六首皆七言律詩如不詠燕蝶而詠睡燕蝶不詠雁鶯而詠雁字鶯梭其標題皆纎仄葢沿雍陶諸人之波而彌趨新巧瞿宗吉歸田詩話曰謝宗可百詠詩世多傳誦除走馬燈蓮葉舟混堂睡燕數篇難得全首佳者其説信然四詩亦非出髙作顧嗣立録其四十首又摘其警句二十聨其中如筆陣之怒捲龍蛇雲霧泣長驅風雨鬼神驚則傷于麤豪螳螂簪之髩雪冷侵霜斧落髪雲低壓翠裳空則傷于凑砌亦未可言工緻特以格調雖卑才思尚艷詩教廣大宜無所不有元人舊帙姑存之備一體耳歸田詩話又曰曩見邱彦能誦宗可賣花聲詩一首百詠中不載葢性既喜此一格則隨事成吟非作此一集而絶筆彦能所誦殆出于此集既成之後歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
