body:
  text: 詠物詩元謝宗可撰睡燕補巢銜罷落花泥困頓東風倦翼低金屋晝長隨蝶化雕梁春盡怕鶯啼魂飛漢殿人應老夢入烏衣路轉迷却怪卷簾人喚醒小橋深巷夕陽西睡蝶不趂游蜂上下狂閒舒倦翅怯尋芳花房舞罷春酣重蕙徑棲遲曉夢長貪困有誰憐褪粉返魂無力去偷香漆園傲吏忘形久莫到蘧蘧枕上忙紙帳清懸四壁剡溪霜髙卧梅花月半牀繭甕有天春不老瑶臺無夜雪生香覺來虛白神光發睡去清閒好夢長一枕總無塵土氣何妨留我白雲鄉紙衾霜搗溪藤一幅新醉來髙卧付詩人松床夜暖雲生席蕙帳香融雪滿身翡翠多情嫌寂寞鴛鴦無分樂清貧枕邊不作紅塵夢睡足梅花玉洞春茶筅此君一節瑩無瑕夜聽松聲潄玉華萬縷引風歸蟹眼半瓶飛雪起龍牙香凝翠髮雲生腳濕滿蒼髯浪捲花到手纖毫皆盡力多應不負玉川家酒旗水村山郭酒初香紵影青青字一行壚畔低懸花霧濕檐陰斜揭栁風涼指揮意馬衝愁陳搖曵心旌入醉鄉惆悵步兵招不起半竿空自舞斜陽詩瓢雨蔓霜條老翠壺吟邊不是酒胡盧剖開架上輪囷玉著盡胸中錯落珠滿貯苦心留宇宙深藏清氣付江湖誰家半腹能千首為問山人果在無筆陳授筆登壇拜墨卿霜毫不用鐵為兵戰酣已拔三都壘奏捷還攻五字城怒捲龍蛇雲霧泣長驅風雨鬼神驚攀蟾獨掃千軍退功奪中書第一名雁賔地北天南萬里身驚寒昨夜過邊城暫隨沙漠秋來夢留得湘江社後春水宿雲飛同是客風嘹月唳自相親荒汀斷渚年年路應認蘆花作主人蝶使頒紅降紫繞芳菲催就東風錦萬機採訪有心香外舞指揮無計日邊飛曉穿竹徑應持節暖駐花房欲繡衣可解黃花驚别夢折梅休恨寄難歸雁字蘆花月底寄秋情陳影南飛勢不停一畫寫開湘水碧半行草破楚天青雲箋泠印蟲書迹烟墨濃摹鳥篆形題盡子卿心事苦斷文無數落寒汀鶯梭自織春風金縷衣穿紅度翠往來飛栁堤暗捲絲千尺花塢橫拋錦萬機時見枝頭捎蝶去不愁壁上化龍歸羞同杼柚勞紅女一擲遷喬願有違龍杖鱗甲光搖玉一枝幽宫躍出袖中持多因掌握提攜晚休恨飛騰變化遲緩策不愁山雨濕醉橫長有野雲隨㑹看掛壁風雷起莫待詩翁過葛陂虎枕縛取南山白額兒鼻如雷吼卧支頤床頭夜嘯威長在帳底風生醉不知探穴捋鬚應有夢寢皮食肉未為奇何如敔伏重華殿聽徹簫韶九奏時螢燈微螢閃閃拂晴波幾度黃昏誤舞蛾銀粟無烟棲碧蘚玉蟲留影綴青莎秋空雨歇寒光墜晚徑風閒冷燼多欲喚紗囊車武子為渠還賦短檠歌雁陳渡江秋影又南征折葦銜枚夜不驚冷聚圓沙盤地軸曉浮寒水落天衡風馳截破湘烟濶雲擁斜衝塞月明洲渚網羅應有伏橫空千里不留行鶴骨笛滿竅芝香透骨濃誰將仙蛻截星筒從教庭下梅花落似怨山中蕙帳空三弄瑶林驚曉露一聲華表泣秋風絶勝瘞作江邊土好奏南飛步月宫虎頂杯骨醉於莵一掬春掌中白額氣如雲南山月暈夢初醒北海風生酒半醺暢飲自懷班定逺酣歌誰酹顧參軍醉鄉亦有封侯地笑綰金符便策勳鷺羽扇立烟睡雨白蒙茸盡付驅炎掌握中暑退沙頭千㸃雪涼生頂上幾絲風曽聞異物陪修靜莫染纎塵障庾公揮動半襟詩夢醒誰憐拳足蓼花叢鼠鬚筆夜逐虛星上月宫奮髯奪得管城公槖中不攪吟窗夢指下先爭翰苑功莫笑硯池濡醉墨絶勝倉廪飽陳紅平生嚙盡詩書字散作龍蛇落紙中龍涎香瀛島蟠龍玉吐零輕氛飛繞博山青暖浮蛟窟潮聲怒清徹驪宫蟄睡醒碧腦貯箱收海氣紅薇滴露洗雲腥雨窗篝火濃熏破夢駕蒼鱗上帝庭螳螂簮螵蛸枝上化薰風飛掠詩翁短帽中鬢雪冷侵霜斧落髮雲寒壓翠裳空為裁象齒形如在試插蟬冠氣尚雄開卷尋行煩一指不須當轍怒莊公蟾蜍水滴三足爬沙飲海歸案頭飛墮曉風吹慣看毛頴臨池浴不借姮娥入月騎蓄潤鑿開琲磊落分涓滴盡墨淋漓胸中一掬恩波在自有龍蛇繞筆時螺杯香醅浮蟻入旋渦半殼蒼瓊費琢磨應愧美人盤寶髻且供豪客捲金波尊中緑照珠光潤掌上春擎海氣多安得滄溟俱變酒垂涎終日飲如何蘆花被白似楊花暖似烘纎塵難到黑甜中軟鋪香絮清無比醉壓晴霜夜不融一枕和秋眠落月五更飛夢逐西風誰憐宿雁江汀冷贏得相思舊恨空蓮葉舟穩棹紅衣泛渺茫風帆浪楫水雲鄉曉撐太華半峰月晚載西湖十里香藕放雪絲應作纜荷擎翠柄若為檣不須更捧金仙足太乙山人夢正涼玉壺氷白似中乾滿不傾是空是色凍無聲十分瑩潔瑕疵淨一樣光輝表裏明雲母夜藏珠暈冷水晶寒孕月華清美人睡起銷金帳折得梅花插未成網巾烏紗未解滌塵煩一網清風兩鬢寒篩影細分雲縷滑棋紋斜界雪絲乾不須漁父燈前結且向詩翁鏡裏看頭上任渠籠絡盡有時怒髮亦衝冠胭脂仙花和露搗芳塵駐得宫娥不老春香暈紅潮生玉頰暖融綘蠟㸃櫻唇渭流漲膩人應逺宫井留斑恨愈新鏡倚緑窗嬌夢醒素纎微蘸晚粧勻琉璃簾澄光搖碎一庭秋瑩碧玲瓏皺浪浮淨練懸風晴未落明河接地曉難收氷痕半捲銀鈎冷繡帶低垂玉縷柔纎手怯寒輕揭起不妨月影上南樓走馬燈飈輪擁騎駕炎精飛繞人間不夜城風鬛追星低弄影霜蹄逐電去無聲秦軍夜潰咸陽火吳炬宵馳赤壁兵更憶雕鞍年少夢章臺踏碎月華明泡燈焰吐蘭膏映水晶澄泓不動一漚輕天星影落氷壺夜神汞光凝火鏡明碧暈浮春丹氣溼紅雲泛暖玉華清遊魚不覺三更冷飛入琉璃井底行雪燈一炬燒寒照夜長玉蟲飛入白紗囊氷壺吞月涵秋影海蚌懷珠吐夜光六出自隨飛燼落寸輝不受積陰藏渾疑凍壑寒崖底忽見東風轉太陽蓮燈萬㸃芙蓉午夜芳醉看疑似水雲鄉蘭缸照破西湖夢火樹燒殘太液香焰暖應愁擎夜雨燼寒不為倒秋霜元宵庭院東風曉零落紅衣繞畫梁水燈波明焰暖晚風間泡影飛來鏡裏看萬㸃芙蓉開碧沼一天星斗落氷盤珠浮赤水光猶濕火浴丹池夜未乾照破魚龍波底夢幽宫不怕五更寒書燈吾咿聲裏漏初長願借丹心吐寸光萬古分明看簡冊一生照耀付文章藝編清逼蘭膏暖花燼時粘竹汗香明日金蓮供草制幾人風露在秋堂燈花誰分春色上銀臺小草梢頭吐燼煤丹萼擎烟深夜結朱㽔噴火背陽開吟窗對酒分詩罷旅館敲棋待客來願得東君膏澤滿芳心一㸃不成灰瓶笙爐頭莫為熱中鳴且作松風入耳清火候抽添成别調湯痕深淺變秋聲誰知冷暖情難盡自恨炎涼訴不平何用絳唇吹玉管纎簧低咽夜三更鐵硯不用端溪割紫雲鑄來壯士鐵心存一方自出爐錘巧百鍊原無斧鑿痕金氣冷涵池水潤土花腥蝕墨烟昏堅剛千古難磨了誰為扶桑賦曉暾漁簔翠結香莎付釣舟一竿風雨不須愁苔磯夜泊披寒去葦岸昏歸帶濕收月冷籠衣眠舵㞑天晴隨網曬船頭羊裘莫笑狂奴錯也著烟波萬頃秋釣絲臨流纎影衆鱗驚消得長繅一縷輕鈎墜亂縈春水碧竿垂斜裊晚風清牽回江上烟波夢掣斷人間富貴情我欲笑攜千尺去桃花浪裏拔鯤鯨雪珠萬斛明璣滿地圓瑶龍吞蚌入雲邊淚含曉雨光猶濕聲碎天風孔未穿寒綴松腰聫玉珮冷攢梅臉結花鈿阿滕撒盡難收拾為買豐年不用錢霜花粲粲璚英借露浮日髙還付水東流剪裁應費金神巧開落從教玉女愁有豔淡粧宫瓦曉無香寒壓板橋秋五更不怕樓頭角吹到梅花特地稠栁眼媚暖窺春淺碧浮欲開還閉半顰羞露垂烟縷秋波溜雨歇風條曉淚收上苑困酣興廢夢灞橋看盡古今愁五株彭澤回青否應是生花雪滿頭荷錢青蚨飛繞半池蓮化作波心萬㸃圓白水真人應愛寶上清童子解留錢買空太液繁華夢占斷西湖富貴天一把藕絲穿不起五銖衣冷碧波烟紙鳶孤騫穩駕剡溪雲多少兒童仰羡頻半紙飛騰元在己一絲髙下豈隨人聲馳空碧東風曉影度遙天化日春誰道致身無羽翼回看髙舉絶紅塵雪獅幻出狻猊雪一團玉光如焰起毫端稜稜氷霰藏鋒鋭颯颯風霜滿肺肝氣逼熊羆應股栗威臨犀象亦心寒從人錯認鹽形虎莫向朝陽仰鼻看蟠梅縈青絆碧裂蒼苔嵗晏寒香宛轉來蛟蟄凍雲氷骨瘦龍眠夜月玉鱗開風霜氣勢從千折鐵石心腸亦九回祇為東君甘自屈不教枉占百花魁挂蘭江浦烟叢困草萊靈根從此謝栽培移將楚畹千年恨付與東君一縷開湘女久無塵土夢靈均元是棟梁材午窗試讀離騷罷却怪幽香天上來花霧倦紫酣紅總未醒暗熏芳淚滴無聲羅幃隱繡迷春色綺縠籠香護曉晴薄暝枝頭留睡蝶輕陰樹底咽啼鶯東風捲到䦨干曲半濕游絲舞不成茶烟玉川罏畔影沉沉淡碧縈空杳隔林蚓竅聲微松火暗鳯團香暖竹窗陰詩成禪榻風初起夢破僧房雪未深老鶴歸遲無俗侣白雲一縷在遙岑硯氷裂地層陰透馬肝墨花含凍鎖毫端一泓曉色𤣥霜重半夜天風黑水乾沼面烟凝星影暗潭心雲翳玉光寒便將呵作清泠雨筆掃人間酷暑殘游絲搖曳春光百尺輕烟綃舞斷任縱橫暗縈芳恨應無力亂綰春愁似有情一縷緑楊風正軟半痕紅杏雨初晴莫教飛到天機上恐悮龍梭織不成海蟄層濤擁沫綴蝦行水母含秋孕地靈海氣凍凝紅玉脆天風寒結紫雲腥霞衣褪色氷涎滑璚縷烹香酒力醒應是楚江萍實老誤隨潮信落滄溟江潮靈胥怒闢島門開十萬神兵戰鼓回龍決黃河銀浪湧鼇翻坤軸玉山摧半江飛雪橫空起千里奔雷撼地來欲駕雲帆滄海去秋風八月上蓬萊緑陰萬樹東風湧翠瀾遮藏芳恨料應難入簾蒼靄暮春晚滿地碧雲清晝寒栁暗池臺烟乍濕槐深門巷雨初乾階前花落無人到又染苔痕上石欄紅樹楓塢梨園醉曉霜纈衣零落舞金商半山留日樹無影一徑有風花不香蕭寺烟晴秋易老御溝水急恨空長詩人自愛停車晚還記清陰六月涼醉鄉曽笑三閭不解遊移家欲向麴城頭人酣方外鴻荒夢誰識塵中冨貴愁夜月放船浮酒海春風扶杖上糟丘相逢還似無何有喚起東臯為贈侯塵世人海深藏混混中非烟非樹逺空濛六街綺繡迷香紫九陌笙歌踏軟紅微步緩隨羅襪起清歌飛繞畫梁空南來一騎蛾眉笑又送長安荔入宫仙槎曽作河源萬里舟塵根已斷卧蛟虯無心下土承烟雨有路層霄犯斗牛破浪逺衝銀漢曉凌風徑渡碧天秋歸來帶得支機石誰識人間博望侯天燈龍逐炎精下紫宫夜深不肯落雲中光分霄漢三更黑影亂星辰萬㸃紅玉樹倚天擎火齊金繩繫日挂瑶空照開仙闕光明路絳節霓旌穩駕風醒酒石子孫猶自問監軍醒籍千年迹已陳蒼骨冷侵酣枕夢苔痕清逼醉鄉春西風别墅啼山鬼落日朱崖泣海神牛李相傾果何得太湖甲乙更誰人無絃琴獨繭長繅底用抽蛇紋空鎖鳯枝秋落星留暈繩光斷凍瀑無聲練影收别鶴那聞風外泣孤鸞不向月中愁多情只有柴桑老寂寂髙山水自流橘杯薺穰初碎擘輕甌一飲何須大白浮瓊液曉凝滄水霧金波夜浸洞庭秋寒香噴手酲初解霜氣浮尊暖未收酩酊敲棋呼二叟夢中同作醉鄉遊梅杖紫玉槎牙蝕蘚痕黃昏扶醉倍精神一枝冷曳孤山雪七尺橫拖庾嶺春江路䇿雲香在手溪橋挑月影隨人歸來却笑林和靖還現堂中上座身松釀酒大夫何事亦餔糟自恨爭名爝火勞句疑有訛春色未香浮蟻緑雨聲先沸老龍膏不須琥珀供靈藥且作珍珠滴小槽傲却嵗寒消一醉涼州空自換葡萄雪煎茶夜掃寒英煮緑塵松風入鼎更清新月團影落銀河水雲腳香融玉樹春陸井有泉應近俗陶家無酒未為貧詩脾奪盡豐年瑞分付蓬萊頂上人煮茶聲龍芽香暖火初紅曲几蒲團聽未終瑞雪浮江喧玉浪白雲迷洞響松風蠅飛蚓竅詩懷醒車繞羊腸醉夢空如訴蒼生辛苦事蓬萊好問玉川翁賣花聲春光呌遍費千金紫韵紅腔細細尋幾處又驚遊冶夢誰家不動惜芳心響穿紅霧樓臺曉情逐香風巷陌深粧鏡美人聽未了繡簾低揭畫簷陰松枝火蘚骨誰教劫火侵欲將春意破窮陰鱗髯光動紅雲起膏液香融紫霧深餘燼尚留霜後節死灰難滅嵗寒心有時焰氣隨風轉猶是蒼龍澗底吟藕花風舞落紅衣起未休水雲鄉裏正颼颼五更清逼銀塘路六月涼生玉井秋颭浪低翻霞影亂凌波輕弄錦香浮莫教吹醒鴛鴦夢好送真人一葉舟絮化萍㸃綴離人恨已多水流雲散為消磨半篙晴浪星無數兩岸東風雪幾何脫白定知沾化雨取青應是謝恩波滿池為護蒼天影休逐春歸繞汴河松化石苔根蘚幹勢稜嶒不向山中變茯苓傲雪心頑龍蛻骨嘯風聲斷虎留形特堅節操磨今古肯獻瑰奇列丙丁底用區區梁棟具直須鍊補老天青月中桂花金粟如來幻化身嫦娥留得護氷輪枝橫大地山河影根老層霄雨露春長有天香飛碧落不教仙子種紅塵折來何必吳剛斧還我凌雲第一人水中梅影澄澄寒碧印氷條雲母屛開見阿嬌春色一枝流不去雪痕千㸃浸難消臨風倚檻雲鬟濕帶月凌波玉珮搖最是黃昏堪畫處橫斜清淺傍溪橋水中雲絮團泠蘸碧琉璃舒捲還如濕未晞蒼狗倒隨天影落玉鸞低入鏡光飛濃遮晚浪搖秋月淡隔晴漪漾夕暉莫怪巫山臺下雨凌波好向夢中歸水中月晴波浸月月波浮玉兔涼生萬頃流丹桂影沉江浦夜白蓮光浴海天秋鮫人泣罷珠還濕龍女粧殘鏡未收應是廣寒眠不得水晶宫裏夜深遊白蓮三千宫額翠雲房洗褪鉛華淺淡粧仙掌月明應自怨東林夢逺為誰芳波澄夜靜花無影露冷風清玉有香舞罷霓裳誰得似六郎清瘦比何郎紅菊錦爛重陽節到時繁華夢裏傲霜枝晚香帶冷凝丹粒秋色封寒㸃絳㽔淡映殘虹迷老圃濃拖斜照落東籬靈砂換却淵明骨倦倚西風不自知藕絲絆玉纒香吐未齊蓮房繅出蛹初肥纎毫何補寸心苦幾縷空縈七竅飛園客可能抽翠繭靈均難為製荷衣年年五月無人買欲織鮫綃不上機蓴線鮫人繡滿水仙裳地軸天機不敢藏氷轂冷纒青縷滑翠鈿清綴玉絲香江湖有味牽情久京洛思歸引興長欲剪吳淞縫不得謾拖秋思繞詩腸同根竹競秀氷霜一種奇駢頭曽脫錦䙀兒西山二子情依舊湘浦雙娥影鎮隨髙節元非連理樹虛心共是嵗寒枝莫教移作仙人杖恐化雌雄下葛陂並蒂蘭碧蕊連芳並萼擎春風江浦對含情不妨燕姞重占夢應愧湘纍獨解清霜節百年期共老國香一㸃為誰爭詩人莫比雙渠怨幸有離騷日月明紅梅梨雲無夢倚黃昏薄倩朱鉛蝕淚痕宿酒破寒薰玉骨仙丹偷暖返氷魂茜裙影露羅衣捲霞珮香封縞袂溫回首孤山斜照外尋真誤入杏花村苔梅一夜蟠龍裂翠鱗土花深護玉精神蒼含滿樹黃昏月碧老孤根太古春姑射香薰荷製好逋仙青入華衣新料應不為天風冷自恐氷肌受㸃塵雪月梅苔枝擎重半朦朧漠漠梨雲夢不同香護姮娥眠玉鑑影隨姑射下瑶宫氷蟾光透南枝夜翠羽聲凄古樹風天上人間渾一色幾分春意有無中緑萼梅萼緑仙人下玉堂清魂夜化雪芬芳荷衣薄襯霓裳冷蘭珮濃熏縞袂香曉額浮酥凝淺黛春容㸃翠照新粧多因誤入羅浮夢愁絶黃昏鬢已蒼梅魂枝南枝北路迢遙飛入孤山夜寂寥水月浮香應自返溪風弄影為誰招縞衣夢裏和愁斷玉笛聲中逐恨消似缺靈均歌楚些逋仙墳草冷蕭蕭梅夢芳魂和睡倚南枝羞比梨花蝶未知暖入羅浮春困早香迷姑射曉醒遲不愁夜月青衣濕應怕江天畫角吹一㸃調羮心事在宵衣枕上覺多時松梅挺秀凝香一樣清何妨同結嵗寒盟風霜正共孤髙概雪月相看太古情翠袖不禁氷骨冷蒼顔還照玉肌明孤根雅操千年節未許繁華老此生月下梅月到梅花分外明暗香孤影鬬雙清吟隨野鶴依璚樹卧聽飛鸞載玉笙酒醉不知霜滿阜書聲常共漏三更此中意味無人識謾說仙家白玉京桃梅去年人面映紗窗今日酸心傍石缸白雪紅霞俱第一暖蜂寒蝶不成雙神臣嵗晚希調鼎姑射年深擬度江獨立黃昏人似玉劉郎重見亦心降問梅尋春踏雪過西湖試叩風前玉一株香影為誰甘寂寞精神何獨占清癯鐘殘角斷愁多少月落參橫夢有無吟繞南枝渾不應好將心事喚林逋挑梅折取孤山玉雪花杖藜髙挂踏烟霞負他白鶴看仙塜帶爾青蚨到酒家有腳陽春詞可證無言姑射貌堪誇相攜相伴歸時晚添箇隨人月一牙龍形松夭矯拏雲海上來蜿蜒蛻骨老莓苔紫髯夜濕千山雨鐵甲春生萬壑雷影動欲翻平陸起聲號如捲怒潮回蜷枝冷掛巖前月猶是擎珠照九垓鴛鴦梅兩兩魁春簇錦機文衾夢覺月分輝枝頭交頸棲香暖花底同心結子肥金殿鎖烟粧粉額玉堂環水浴紅衣有情一種隨流去莫被風飄各自飛鴛鴦菊秋入金塘脫錦裳芳心並倚紫紗囊韓慿枕上情難了陶令門前夢更長深院霜清宫瓦冷東籬月落繡衾涼誰知連理枝頭恨還有西風晚節香半日閒閒處光陰未有涯偶然一晌到山家坐看雲起晝停午靜聽泉流日未斜槐影正圓初破睡竹陰微轉罷分茶也勝忙裏風波客十二時中老鬢華曉色逺似烟霏近似空非明非夜兩朦朧一天清露洗難退幾抹曙雲遮不窮斷角樓臺濃淡裏殘燈院落有無中蒼茫半逐雞聲散又被朝陽染作紅水紋新緑粼粼深淺漪織成春色上苔衣一池碧暈雨初落千曡翠鱗風更微淨縠光搖湘女鏡輕羅影動水仙機何如袖取并刀去快剪吳淞半幅歸竹夫人胸次玲瓏粉黛羞宵征何必抱衾裯應無雲雨三更夢自有氷霜六月秋盡節每曽陳諷刺虛心那解老溫柔専房不怕蛾眉妒只恐西風動别愁白雁翅老西風㸃綴霞秋江難認宿蘆花雲邊字缺銀鈎斷月下筝閒玉柱斜影亂飛鷗回逺浦陳迷宿鷺落平沙聲聲呌起蘇郎恨為帶吳霜染鬢華塔燈拔地燒空寶炬長燭龍挂影照穹蒼七層火樹雲生暖九曲神珠夜吐光霞㸃彤􅓚歸淨界星隨綘節下西方如來應到天壇上萬斛金蓮繞步香沙書𤣥沙一握舞蛟虯草聖何須墨染頭鳥過篆文歸鐵畫蟹行清響落銀鈎竹間日射文星粲紙上風驚字迹收大手莫將成末藝論功寧愧管城侯雙陸彩骰清響押盤飛曽記唐宫為賜緋影入空梁殘月在聲隨征馬落星稀重門據險應輸擲數㸃爭雄莫露機惟恨懷英誇敵手御前奪取翠裘歸浴堂香泉湧出半池溫難洗人間萬古塵混沌殼中天不曉淋漓氣底夜長春波濤鼓怒喧風雨雲霧隨陰護鬼神却笑相逢裸形國不知誰是浴沂人詠物詩
